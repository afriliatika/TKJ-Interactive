<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tentang Aplikasi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="phone-screen">
    <!-- Header Biru Cerah -->
    <div class="header-blue">
        <h3><i class="fas fa-info-circle"></i> Tentang Aplikasi</h3>
    </div>

    <!-- Konten Utama (Dibuat Rapi di Tengah) -->
    <div style="padding: 30px 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        
        <!-- Icon Aplikasi Besar -->
        <div style="background: white; width: 100px; height: 100px; border-radius: 25px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(56, 182, 255, 0.2); margin-bottom: 20px;">
            <i class="fas fa-laptop-code" style="font-size: 50px; color: #38b6ff;"></i>
        </div>

        <h2 style="color: #1e293b; font-size: 1.4rem; margin-bottom: 5px;">Aplikasi Pengenalan TKJ</h2>
        <p style="color: #64748b; font-weight: 600; margin-bottom: 25px;">Versi 1.0</p>

        <!-- Garis Pemisah Tipis -->
        <div style="width: 50px; height: 4px; background: #38b6ff; border-radius: 10px; margin-bottom: 25px;"></div>

        <p style="color: #475569; line-height: 1.7; font-size: 0.95rem;">
            Aplikasi ini dirancang secara interaktif untuk membantu siswa memahami dasar-dasar <b>Teknik Komputer dan Jaringan</b> dengan cara yang lebih menyenangkan dan mudah diakses kapan saja.
        </p>
    </div>

    <!-- Navigasi Bawah -->
    <div style="padding: 20px; text-align: center; border-top: 1px solid #f1f5f9;">
        <a href="index.html" class="btn-blue" style="width: 100%;">
            <i class="fas fa-arrow-left"></i> Kembali ke Menu
        </a>
    </div>
</div>

</body>
</html>
